<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchly - Host Room</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --panel: #131022;
        --panel-2: #1a1731;
        --text: #ecebfb;
        --muted: #a9a6c7;
        --primary: #4b2bee;
        --border: #2d2752;
        --ok: #10b981;
        --warn: #f59e0b;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); }
      .layout { max-width: 1200px; margin: 0 auto; padding: 1rem; display: grid; gap: 1rem; }
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: .9rem 1rem; border: 1px solid var(--border); border-radius: 12px; background: rgba(19,16,34,.85);
      }
      .brand { font-weight: 800; font-size: 1.1rem; }
      .grid { display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 1rem; }
      .card { border: 1px solid var(--border); border-radius: 14px; padding: 1rem; background: var(--panel); }
      .section-title { margin: 0 0 .8rem; font-size: .88rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
      .row { margin-bottom: .85rem; }
      .btn {
        background: var(--primary); color: white; border: 0; border-radius: 10px; padding: .65rem .9rem;
        font-weight: 700; cursor: pointer;
      }
      .btn.secondary { background: #221d3f; border: 1px solid var(--border); }
      .btn:disabled { opacity: .55; cursor: not-allowed; }
      input { width: 100%; border-radius: 10px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); padding: .65rem .75rem; }
      label { font-size: .9rem; color: var(--muted); display: inline-block; margin-bottom: .45rem; }
      a { color: #8f87ff; word-break: break-all; }
      .status { color: var(--muted); font-size: .92rem; }
      .status.ok { color: var(--ok); }
      .status.warn { color: var(--warn); }
      video { width: 100%; border-radius: 12px; border: 1px solid var(--border); background: #000; }
      ul { margin: 0; padding-left: 1rem; color: var(--muted); }
      .pill { display: inline-block; padding: .2rem .5rem; border: 1px solid var(--border); border-radius: 999px; font-size: .78rem; color: var(--muted); }
      #room-panel { display: none; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <div class="brand">Watchly Host</div>
        <div class="pill">Host controls playback</div>
      </header>

      <div class="grid">
        <main class="card">
          <h2 class="section-title">Playback Control</h2>

          <div class="row">
            <button id="create-room" type="button" class="btn">Create Room</button>
            <span id="room-status" class="status"></span>
          </div>

          <div id="room-panel">
            <div class="row">
              <label>Invite Link</label>
              <div><a id="invite-link" href="#"></a></div>
            </div>

            <div class="row">
              <label for="video-url">Video URL (Direct public MP4)</label>
              <input id="video-url" placeholder="https://example.com/movie.mp4" />
            </div>

            <div class="row" style="display:flex; gap:.6rem; flex-wrap:wrap;">
              <button id="load-video" type="button" class="btn">Load Video</button>
              <button id="retry-validation" type="button" class="btn secondary" disabled>Retry Validation</button>
            </div>

            <p class="status warn"><strong>Recommendation:</strong> use a direct public MP4 URL. Drive/share links may fail in browser video players.</p>
            <p id="source-status" class="status">No video source loaded yet.</p>

            <video id="video" controls></video>
          </div>
        </main>

        <aside class="card">
          <h2 class="section-title">Participants</h2>
          <ul id="participants"></ul>
        </aside>
      </div>
    </div>

    <script>
      let roomId = null;
      let participantTimer = null;
      let sendTimer = null;
      let isValidatingVideo = false;
      let lastAttemptedSource = '';

      const video = document.getElementById('video');
      const roomStatus = document.getElementById('room-status');
      const sourceStatus = document.getElementById('source-status');
      const retryValidationButton = document.getElementById('retry-validation');
      const loadVideoButton = document.getElementById('load-video');
      const createRoomButton = document.getElementById('create-room');

      function setSourceStatus(message, tone) {
        sourceStatus.textContent = message;
        sourceStatus.className = `status${tone ? ` ${tone}` : ''}`;
      }

      function setRoomStatus(message, tone) {
        roomStatus.textContent = message;
        roomStatus.className = `status${tone ? ` ${tone}` : ''}`;
      }

      function setVideoValidationBusyState(busy) {
        isValidatingVideo = busy;
        loadVideoButton.disabled = busy;
        retryValidationButton.disabled = busy || !lastAttemptedSource;
      }

      async function requireHost() {
        try {
          const res = await fetch('/me');
          if (res.status === 401) {
            setRoomStatus('Please sign in first. Redirecting...', 'warn');
            window.location.href = '/public/index.html';
            return;
          }

          if (!res.ok) {
            setRoomStatus('Unable to verify host session right now.', 'warn');
          }
        } catch (_error) {
          setRoomStatus('Network error while checking login session.', 'warn');
        }
      }

      async function createRoom() {
        setRoomStatus('Creating room...');
        createRoomButton.disabled = true;

        try {
          const res = await fetch('/api/rooms', { method: 'POST' });

          let data = {};
          const contentType = (res.headers.get('content-type') || '').toLowerCase();
          if (contentType.includes('application/json')) {
            data = await res.json();
          }

          if (!res.ok) {
            setRoomStatus(data.error || 'Failed to create room. Please sign in again.', 'warn');
            if (res.status === 401) {
              setTimeout(() => {
                window.location.href = '/public/index.html';
              }, 700);
            }
            return;
          }

          roomId = data.id;
          const invite = `${location.origin}/public/room.html?id=${roomId}`;
          const inviteLink = document.getElementById('invite-link');
          inviteLink.href = invite;
          inviteLink.textContent = invite;
          setRoomStatus(`Room ${roomId} created.`, 'ok');
          document.getElementById('room-panel').style.display = 'block';

          if (participantTimer) clearInterval(participantTimer);
          participantTimer = setInterval(refreshParticipants, 2000);
          refreshParticipants();
        } catch (_error) {
          setRoomStatus('Unable to create room right now. Please try again.', 'warn');
        } finally {
          createRoomButton.disabled = false;
        }
      }

      async function refreshParticipants() {
        if (!roomId) return;
        const res = await fetch(`/api/rooms/${roomId}`);
        if (!res.ok) return;
        const data = await res.json();
        const list = document.getElementById('participants');
        list.innerHTML = '';

        if (!data.participants.length) {
          const li = document.createElement('li');
          li.textContent = 'No guests yet. Share your invite link.';
          list.appendChild(li);
          return;
        }

        data.participants.forEach((p) => {
          const li = document.createElement('li');
          li.textContent = p.name;
          list.appendChild(li);
        });
      }

      function debounceSendPlayback() {
        if (!roomId || isValidatingVideo) return;
        if (sendTimer) clearTimeout(sendTimer);
        sendTimer = setTimeout(sendPlayback, 200);
      }

      async function sendPlayback() {
        if (!roomId) return;
        await fetch(`/api/rooms/${roomId}/playback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            time: video.currentTime,
            playing: !video.paused,
            videoUrl: document.getElementById('video-url').value.trim()
          })
        });
      }

      function looksLikeDirectMp4(url) {
        try {
          const parsed = new URL(url);
          return /\.mp4($|\?)/i.test(parsed.pathname + parsed.search);
        } catch (_error) {
          return false;
        }
      }

      function validateVideoSource(url) {
        return new Promise((resolve, reject) => {
          let done = false;

          function cleanup() {
            video.removeEventListener('loadedmetadata', onLoadedMetadata);
            video.removeEventListener('error', onError);
            clearTimeout(timeoutId);
          }

          function finishError(message) {
            if (done) return;
            done = true;
            cleanup();
            reject(new Error(message));
          }

          function onLoadedMetadata() {
            if (done) return;
            done = true;
            cleanup();
            resolve();
          }

          function onError() {
            finishError('Video failed to load. Use a direct public MP4 URL.');
          }

          const timeoutId = setTimeout(() => {
            finishError('Video load timed out. Use a direct public MP4 URL.');
          }, 10000);

          video.addEventListener('loadedmetadata', onLoadedMetadata);
          video.addEventListener('error', onError);
          video.src = url;
          video.load();
        });
      }

      async function applyVideoSource(url, label) {
        const trimmed = (url || '').trim();
        if (!trimmed) {
          setSourceStatus('Validation failed: missing video URL.', 'warn');
          return;
        }

        lastAttemptedSource = trimmed;
        setVideoValidationBusyState(true);
        setSourceStatus(label ? `${label}: validating...` : 'Validating selected video...');

        if (!looksLikeDirectMp4(trimmed)) {
          setSourceStatus('This does not look like a direct MP4 link. Share links may fail.', 'warn');
        }

        try {
          await validateVideoSource(trimmed);
          document.getElementById('video-url').value = trimmed;
          setSourceStatus('Playable and synced to room.', 'ok');
          debounceSendPlayback();
        } catch (error) {
          setSourceStatus(error.message, 'warn');
        } finally {
          setVideoValidationBusyState(false);
        }
      }

      function loadVideo() {
        const input = document.getElementById('video-url');
        applyVideoSource(input.value, 'Manual URL');
      }

      function retryValidation() {
        if (!lastAttemptedSource || isValidatingVideo) return;
        applyVideoSource(lastAttemptedSource, 'Retry source');
      }

      document.getElementById('create-room').addEventListener('click', createRoom);
      document.getElementById('load-video').addEventListener('click', loadVideo);
      document.getElementById('retry-validation').addEventListener('click', retryValidation);
      video.addEventListener('play', debounceSendPlayback);
      video.addEventListener('pause', debounceSendPlayback);
      video.addEventListener('seeked', debounceSendPlayback);

      requireHost();
    </script>
  </body>
</html>
